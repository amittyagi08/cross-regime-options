scanner:
  data_provider: "yahoo"

ibkr:
  host: "127.0.0.1"
  port: 7496
  client_id: 1
  market_data_type: "delayed"
  market_data_generic_ticks: ""
  market_data_fallback_types:
    - "delayed_frozen"

strategy:
  min_price: 20
  max_dte: 21
  min_dte: 7

momentum:
  lookback_days: 10
  volume_lookback_days: 10

options:
  option_type: "CALL"
  min_delta: 0.50
  max_delta: 0.70
  max_theta_abs: 0.20
  max_bid_ask_spread_pct: 0.08
  min_open_interest: 100
  strike_window_pct: 0.10

black_scholes:
  risk_free_rate: 0.045
  dividend_yield: 0.0

backtest:
  enabled: true
  mode: "daily"
  start_date: "2021-01-01"
  end_date: "2026-04-26"
  initial_capital: 10000
  capital_per_trade: 1000
  max_positions: 3
  max_holding_days: 5
  one_trade_per_ticker: true
  avoid_last_n_bars: 5

sector_rotation:
  enabled: true
  rebalance_frequency: "W-MON"
  freeze_universe_for_week: true
  top_sectors: 3
  top_stocks_per_sector: 5
  min_sector_score: 60
  min_stock_score: 55
  include_benchmark_symbols: true
  allow_benchmark_trading: false
  benchmark_symbol: "SPY"
  growth_benchmark_symbol: "QQQ"

risk_controls:
  enabled: true
  stop_loss_pct: -0.18
  exit_if_no_followthrough_days: 4
  no_followthrough_min_profit_pct: 0.01
  pause_after_consecutive_losses: 999
  pause_days: 0
  max_daily_loss_pct: -0.10
  max_weekly_loss_pct: -0.20
  cooldown_days_after_ticker_loss: 1
  max_trades_per_ticker_per_month: 10
  max_open_positions_per_ticker: 1
  max_open_positions_per_sector: 2
  max_trades_per_sector_per_week: 10
  max_sector_capital_pct: 0.50
  max_open_positions: 3
  max_new_trades_per_day: 4
  reduce_size_after_drawdown_pct: -0.20
  reduced_position_size_pct: 0.85

profit_management:
  enabled: true
  profit_target_1_pct: 0.40
  sell_half_at_target_1: true
  runner_trailing_stop_pct: 0.25
  runner_max_holding_days: 8

risk_reporting:
  save_risk_events: true
  risk_events_path: "output/risk_events.csv"

sector_scoring:
  use_rank_normalization: true
  one_week_weight: 0.30
  one_month_weight: 0.40
  three_month_weight: 0.30
  relative_strength_weight: 0.25
  trend_weight: 0.20
  acceleration_weight: 0.15
  momentum_weight: 0.40

stock_scoring:
  use_rank_normalization: true
  relative_strength_vs_sector_weight: 0.35
  momentum_weight: 0.30
  trend_weight: 0.20
  liquidity_weight: 0.15
  min_average_dollar_volume: 50000000

daily_strategy:
  min_momentum_score: 0.05
  require_price_above_ema21: true
  require_price_above_sma50: true

data:
  provider: "yahoo"
  daily_period: "2y"
  intraday_60m_period: "730d"
  intraday_5m_period: "60d"

daily_filter:
  use_spy_regime: true
  use_qqq_regime: true
  use_smh_regime: true
  require_close_above_sma50: true
  require_close_above_sma200: false
  require_ema21_above_sma50: false
  min_daily_momentum_score: 0.04

regime:
  spy_symbol: "SPY"
  qqq_symbol: "QQQ"
  smh_symbol: "SMH"
  require_spy_above_sma50: true
  require_qqq_above_sma50: true
  require_smh_above_sma50: false
  require_qqq_momentum_positive: true

timeframe_60m:
  enabled: true
  require_price_above_ema21: true
  require_positive_momentum: true
  momentum_lookback_bars: 6
  breakout_lookback_bars: 10
  min_60m_return: 0.005
  avoid_if_extended_from_ema21_pct: 0.06

timeframe_5m:
  enabled: true
  entry_trigger: "breakout_or_vwap_reclaim"
  require_price_above_vwap: true
  opening_range_minutes: 30
  breakout_lookback_bars: 6
  min_5m_return: 0.003
  min_volume_ratio: 1.2
  avoid_first_minutes: 10
  avoid_last_minutes: 20

mtf_scoring:
  entry_threshold: 60
  early_exit_threshold: 40
  full_size_threshold: 75
  half_size_multiplier: 0.5

synthetic_options:
  min_dte: 14
  max_dte: 30
  target_delta: 0.60
  min_delta: 0.50
  max_delta: 0.70
  strike_step: 5
  risk_free_rate: 0.045
  dividend_yield: 0.0
  volatility_lookback_days: 20
  volatility_floor: 0.20
  volatility_ceiling: 1.20

entry:
  min_momentum_score: 0.05
  require_price_above_ema21: true
  require_price_above_sma50: true

exit:
  profit_target_pct: 0.40
  stop_loss_pct: -0.25
  max_holding_days: 5
  exit_on_close_below_ema21: true
  exit_on_5m_vwap_loss: true
  exit_on_60m_ema21_loss: true
  exit_if_no_followthrough_bars: 12
  no_followthrough_min_profit_pct: 0.05

overtrading:
  max_trades_per_day: 3
  max_trades_per_ticker_per_week: 2
  min_hours_between_trades_same_ticker: 24

output:
  ranked_contracts_path: "output/ranked_contracts.csv"
  backtest_trades_path: "output/backtest_trades.csv"
  backtest_equity_curve_path: "output/backtest_equity_curve.csv"
  backtest_summary_path: "output/backtest_summary.json"
  daily_backtest_trades_path: "output/daily_backtest_trades.csv"
  daily_backtest_equity_curve_path: "output/daily_backtest_equity_curve.csv"
  daily_backtest_summary_path: "output/daily_backtest_summary.json"
  mtf_backtest_trades_path: "output/mtf_backtest_trades.csv"
  mtf_backtest_equity_curve_path: "output/mtf_backtest_equity_curve.csv"
  mtf_backtest_summary_path: "output/mtf_backtest_summary.json"
  comparison_summary_csv_path: "output/comparison_summary.csv"
  comparison_summary_json_path: "output/comparison_summary.json"
  sector_scores_path: "output/sector_scores.csv"
  weekly_universes_path: "output/weekly_universes.csv"
  sector_rotation_backtest_trades_path: "output/sector_rotation_backtest_trades.csv"
  sector_rotation_backtest_equity_curve_path: "output/sector_rotation_backtest_equity_curve.csv"
  sector_rotation_backtest_summary_path: "output/sector_rotation_backtest_summary.json"
  sector_rotation_risk_backtest_trades_path: "output/sector_rotation_risk_backtest_trades.csv"
  sector_rotation_risk_backtest_equity_curve_path: "output/sector_rotation_risk_backtest_equity_curve.csv"
  sector_rotation_risk_backtest_summary_path: "output/sector_rotation_risk_backtest_summary.json"
  sector_comparison_summary_csv_path: "output/sector_comparison_summary.csv"
  sector_comparison_summary_json_path: "output/sector_comparison_summary.json"
  risk_comparison_summary_csv_path: "output/risk_comparison_summary.csv"
  risk_comparison_summary_json_path: "output/risk_comparison_summary.json"


